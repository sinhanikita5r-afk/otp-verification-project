<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(45deg, #FFD1DC, #FFB6C1);
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            padding: 10px 30px;
            border: none;
            border-radius: 5px;
            cursor:     pointer;
            font-size: 16px;
            width: 100%;
            margin: 15px 0;
        }

        button:hover {
            background: #764ba2;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .hidden {
            display: none;
        }

        .timer {
            color: red;
            font-size: 18px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>OTP Verification</h1>

        <!-- Step 1: Email Input -->
        <div id="step1">
            <input type="email" id="email" placeholder="Enter your email">
            <button onclick="sendOTP()">Send OTP</button>
        </div>

        <!-- Step 2: OTP Verification -->
        <div id="step2" class="hidden">
            <p>OTP sent to: <strong id="emailDisplay"></strong></p>
            <div class="timer">Time: <span id="timer">60</span>s</div>
            <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6">
            <button onclick="verifyOTP()">Verify OTP</button>
            <button onclick="goBack()">Back</button>
        </div>

        <!-- Message Display -->
        <div id="message" class="message"></div>
    </div>

    <script>
        let generatedOTP = '';
        let timerInterval = null;
        let timeLeft = 60;

        // Generate OTP
        function sendOTP() {
            let email = document.getElementById('email').value;

            if (email == '') {
                showMessage('Please enter email', 'error');
                return;
            }

            // Generate 6-digit random OTP
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

            // Show in console and alert (for demo)
            console.log('Generated OTP: ' + generatedOTP);
            alert('Your OTP is: ' + generatedOTP);

            // Show step 2
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            document.getElementById('emailDisplay').textContent = email;
            document.getElementById('otp').value = '';

            // Start timer
            startTimer();
        }

        // Start countdown timer
        function startTimer() {
            timeLeft = 60;
            document.getElementById('timer').textContent = timeLeft;

            timerInterval = setInterval(function() {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showMessage('OTP Expired! Please send again', 'error');
                    document.getElementById('step2').classList.add('hidden');
                    document.getElementById('step1').classList.remove('hidden');
                }
            }, 1000);
        }

        // Verify OTP
        function verifyOTP() {
            let enteredOTP = document.getElementById('otp').value;

            if (enteredOTP == '') {
                showMessage('Please enter OTP', 'error');
                return;
            }

            if (enteredOTP === generatedOTP) {
                clearInterval(timerInterval);
                document.getElementById('step2').classList.add('hidden');
                showMessage('✓ OTP Verified Successfully!', 'success');
            } else {
                showMessage('✗ Wrong OTP! Try Again', 'error');
                document.getElementById('otp').value = '';
            }
        }

        // Show message
        function showMessage(text, type) {
            let msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = 'message ' + type;
        }

        // Go back to step 1
        function goBack() {
            clearInterval(timerInterval);
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('email').value = '';
            document.getElementById('message').className = 'message';
        }
    </script>
</body>
</html>
